<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ability Calculator</title>

<style>
body { font-family: Arial; margin: 20px; }

table {
border-collapse: collapse;
width: 100%;
margin-top: 15px;
}

th, td {
border: 1px solid #aaa;
padding: 6px;
text-align: center;
}

button {
padding: 6px 10px;
margin: 4px;
cursor: pointer;
}

.smallInput { width: 45px; }
.engineCol { width: 70px; }

.green { color: green; font-weight: bold; }
.red { color: red; font-weight: bold; }

#totals {
margin-top: 20px;
font-weight: bold;
}
</style>
</head>

<body>

<h2>NavyFIELD True Ability Calculator</h2>

<button onclick="addRow()">Add Sailor</button>
<button onclick="updateAll()">Refresh / Recalculate</button>

<table id="taTable">

<thead>
<tr>
<th>Sailor Type</th>
<th>Acc</th>
<th>Rel</th>
<th>Primary</th>
<th>Repair</th>
<th>Recruits</th>
<th>Experts</th>
<th>Vets</th>

<th>Primary TA</th>
<th>% of Cap</th>
<th>Status</th>

<th>Repair/sec</th>

<th class="engineCol">Engine OH/sec</th>

<th>Acc %</th>
<th>Rld %</th>

<th>Remove</th>
</tr>
</thead>

<tbody></tbody>
</table>

<div id="totals">
<div id="repairTotal"></div>
<div id="engineTotal"></div>
</div>

<script>

const caps = {
"Gunner": null,
"Torpedo": 1000000,
"Sonar": 4000000,
"Planesman (5M nations)": 5000000,
"Planesman (6.5M nations)": 6500000,
"Restore (900 SD)": 900,
"Repair": null,
"Engine": null,
"Aircraft": null,
"Fighter": null,
"Bomber": null
};

const ACC_CAP = 1400000;
const RLD_CAP = 2080000;
const REPAIR_CAP = 280;

function addRow(){

const tbody = document.querySelector("#taTable tbody");

const row = document.createElement("tr");

row.innerHTML = `
<td>
<select onchange="updateAll()">
<option value="">--Select--</option>
${Object.keys(caps).map(c=>`<option value="${c}">${c}</option>`).join("")}
</select>
</td>

<td><input class="acc smallInput" type="number" value="0" oninput="updateAll()"></td>
<td><input class="rel smallInput" type="number" value="0" oninput="updateAll()"></td>
<td><input class="pri smallInput" type="number" value="0" oninput="updateAll()"></td>
<td><input class="rep smallInput" type="number" value="0" oninput="updateAll()"></td>

<td><input class="rec smallInput" type="number" value="0" oninput="updateAll()"></td>
<td><input class="exp smallInput" type="number" value="0" oninput="updateAll()"></td>
<td><input class="vet smallInput" type="number" value="0" oninput="updateAll()"></td>

<td class="primaryTACell">0</td>
<td class="pctCell">-</td>
<td class="statusCell">-</td>

<td class="repairCell">0</td>

<td class="engineCell engineCol">-</td>

<td class="accPct">-</td>
<td class="rldPct">-</td>

<td><button onclick="removeRow(this)">X</button></td>
`;

tbody.appendChild(row);
}

function removeRow(button){
const row = button.closest("tr");
row.remove();
updateAll();
}

function updateAll(){

const rows = document.querySelectorAll("#taTable tbody tr");

let totalRepair = 0;
let totalEngine = 0;

rows.forEach(row=>{

const type = row.querySelector("select").value;

const accAbility = parseFloat(row.querySelector(".acc").value) || 0;
const rldAbility = parseFloat(row.querySelector(".rel").value) || 0;
const primaryAbility = parseFloat(row.querySelector(".pri").value) || 0;
const repairAbility = parseFloat(row.querySelector(".rep").value) || 0;

const recruits = parseFloat(row.querySelector(".rec").value) || 0;
const experts = parseFloat(row.querySelector(".exp").value) || 0;
const vets = parseFloat(row.querySelector(".vet").value) || 0;

const crewWeight = recruits * 0.4 + experts * 1 + vets * 4;

const primaryTA = Math.round(crewWeight * primaryAbility);
const repairTA = crewWeight * repairAbility;

const repPerSec = repairTA / 138500;

row.querySelector(".primaryTACell").textContent = primaryTA.toLocaleString();
row.querySelector(".repairCell").textContent = repPerSec.toFixed(3);

if(repairAbility > 0) totalRepair += repPerSec;

const capValue = caps[type];
const pctCell = row.querySelector(".pctCell");
const statusCell = row.querySelector(".statusCell");

if(capValue){
const pct = (primaryTA / capValue) * 100;
pctCell.textContent = pct.toFixed(1) + "%";

if(primaryTA >= capValue){
statusCell.textContent = "CAPPED";
statusCell.className = "statusCell green";
}else{
statusCell.textContent = "NOT CAPPED";
statusCell.className = "statusCell red";
}
}else{
pctCell.textContent = "-";
statusCell.textContent = "-";
statusCell.className = "statusCell";
}


if(type === "Engine"){
const engineOH = repairTA / 112500;
row.querySelector(".engineCell").textContent = engineOH.toFixed(3);
totalEngine += engineOH;
}else{
row.querySelector(".engineCell").textContent = "-";
}

const accPctCell = row.querySelector(".accPct");
const rldPctCell = row.querySelector(".rldPct");

if(type === "Gunner"){
const accTA = crewWeight * accAbility;
const rldTA = crewWeight * rldAbility;

const accPct = (accTA / ACC_CAP) * 100;
const rldPct = (rldTA / RLD_CAP) * 100;

accPctCell.textContent = accPct.toFixed(1) + "%";
rldPctCell.textContent = rldPct.toFixed(1) + "%";

accPctCell.className = accPct >= 100 ? "accPct green" : "accPct red";
rldPctCell.className = rldPct >= 100 ? "rldPct green" : "rldPct red";
}else{
accPctCell.textContent = "-";
rldPctCell.textContent = "-";
accPctCell.className = "accPct";
rldPctCell.className = "rldPct";
}

});

const totalRepPct = (totalRepair / REPAIR_CAP) * 100;

document.getElementById("repairTotal").innerHTML =
"<u>Total Repair/sec:</u> " + totalRepair.toFixed(3) +
" (" + totalRepPct.toFixed(1) + "% of cap)";

document.getElementById("engineTotal").innerHTML =
"<u>Total Engine OH/sec:</u> " + totalEngine.toFixed(3);

}

</script>

</body>
</html>
